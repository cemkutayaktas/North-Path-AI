<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>NorthVoy — Discover Your Ideal University Major</title>
    <meta name="description" content="NorthVoy helps high school students discover their ideal university major through a smart 9-question quiz. Explore 20+ majors, career paths, and universities across 60+ countries." />
    <meta name="keywords" content="university major quiz, career guidance, NorthVoy, student career test, university path finder, academic guidance, major matching" />
    <meta name="author" content="NorthVoy" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="NorthVoy — Discover Your Ideal University Major" />
    <meta property="og:description" content="Answer 9 questions and get matched with your ideal university major, career paths, and universities worldwide. Free and instant." />
    <meta property="og:site_name" content="NorthVoy" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NorthVoy — Discover Your Ideal University Major" />
    <meta name="twitter:description" content="Answer 9 questions and get matched with your ideal university major, career paths, and universities worldwide." />

    <!-- Theme Color -->
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="NorthVoy" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://northvoy.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "NorthVoy",
      "description": "Smart academic guidance tool that matches students with their ideal university major through a structured questionnaire.",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Web",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
